<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Tesla ⚡</title>
    <style>
        /* Estilos Generales */
        body {
            background-color: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Contenedor de la Calculadora */
        .calculator {
            background: linear-gradient(145deg, #161b22, #0d1117);
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0, 247, 255, 0.2), 
                        inset 0 0 10px rgba(255, 255, 255, 0.05);
            border: 2px solid #00f7ff;
            width: 320px;
            position: relative;
        }

        /* Título del Colegio */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #00f7ff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            text-shadow: 0 0 10px #00f7ff;
        }

        .header p {
            font-size: 0.7rem;
            margin: 5px 0 0;
            opacity: 0.7;
        }

        /* Pantalla */
        #display {
            width: 100%;
            height: 60px;
            background-color: #000;
            border: none;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            color: #00f7ff;
            font-size: 1.8rem;
            font-family: 'Courier New', Courier, monospace;
            box-shadow: inset 0 0 10px #00f7ff44;
            outline: none;
        }

        /* Rejilla de Botones */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #1c2128;
            color: white;
            font-weight: bold;
        }

        /* Efecto Hover */
        button:hover {
            background: #00f7ff;
            color: #000;
            box-shadow: 0 0 15px #00f7ff;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(1px);
        }

        /* Botones Especiales */
        .operator {
            color: #ffcc00;
            background: #2d333b;
        }

        .clear {
            background: #ff3e3e;
            grid-column: span 2;
        }

        .clear:hover {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }

        .equal {
            background: #00f7ff;
            color: #000;
            grid-column: span 2;
        }

        /* Decoración de Rayos (Tesla Coils) */
        .decoration {
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 2rem;
        }

    </style>
</head>
<body>

    <div class="calculator">
        <div class="decoration">⚡</div>
        <div class="header">
            <h1>COLEGIO TESLA</h1>
            <p>Laboratorio de Matemáticas</p>
        </div>
        
        <input type="text" id="display" disabled value="0">
        
        <div class="buttons">
            <!-- Fila 1 -->
            <button class="clear" onclick="clearDisplay()">BORRAR</button>
            <button class="operator" onclick="appendToDisplay('/')">÷</button>
            <button class="operator" onclick="appendToDisplay('*')">×</button>
            
            <!-- Fila 2 -->
            <button onclick="appendToDisplay('7')">7</button>
            <button onclick="appendToDisplay('8')">8</button>
            <button onclick="appendToDisplay('9')">9</button>
            <button class="operator" onclick="appendToDisplay('-')">-</button>
            
            <!-- Fila 3 -->
            <button onclick="appendToDisplay('4')">4</button>
            <button onclick="appendToDisplay('5')">5</button>
            <button onclick="appendToDisplay('6')">6</button>
            <button class="operator" onclick="appendToDisplay('+')">+</button>
            
            <!-- Fila 4 -->
            <button onclick="appendToDisplay('1')">1</button>
            <button onclick="appendToDisplay('2')">2</button>
            <button onclick="appendToDisplay('3')">3</button>
            <button onclick="appendToDisplay('.')">.</button>
            
            <!-- Fila 5 -->
            <button onclick="appendToDisplay('0')">0</button>
            <button class="equal" onclick="calculate()">GENERAR ENERGÍA (=)</button>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendToDisplay(input) {
            if (display.value === "0" || display.value === "Error") {
                display.value = input;
            } else {
                display.value += input;
            }
            // Efecto de sonido opcional o vibración visual
            display.style.boxShadow = "inset 0 0 20px #00f7ffaa";
            setTimeout(() => {
                display.style.boxShadow = "inset 0 0 10px #00f7ff44";
            }, 100);
        }

        function clearDisplay() {
            display.value = "0";
        }

        function calculate() {
            try {
                // Evaluamos la operación
                let result = eval(display.value);
                
                // Si el resultado es infinito (división por cero)
                if (!isFinite(result)) {
                    display.value = "Sobrecarga!";
                } else {
                    display.value = result;
                }
            } catch (error) {
                display.value = "Error";
            }
        }

        // Permitir uso de teclado
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (/[0-9]/.test(key)) appendToDisplay(key);
            if (['+', '-', '*', '/'].includes(key)) appendToDisplay(key);
            if (key === 'Enter') calculate();
            if (key === 'Escape') clearDisplay();
            if (key === '.') appendToDisplay('.');
        });
    </script>
</body>
</html>
